
<!DOCTYPE html><html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        :root {
            --system-background: #f2f2f7;
            --system-blue: #007aff;
            --system-gray: #8e8e93;
            --separator-color: #c6c6c8;
            --label-primary: #000000;
            --label-secondary: #8e8e93;
            --grouped-background: #ffffff;
            --grouped-background-ios: #f0f0f0;

            --system-red: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Arial", sans-serif;
            margin: 0;
            background-color: var(--grouped-background-ios);
            color: var(--label-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .header {
            background-color: var(--grouped-background);

            text-align: center;
            font-size: 17px;
            font-weight: 600;
            border-bottom: 0.5px solid var(--separator-color);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button {
            position: absolute;
            left: 16px;
            font-size: 17px;
            color: var(--system-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .footer {
            background-color: var(--grouped-background);
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--label-secondary);
            border-top: 0.5px solid var(--separator-color);
            margin-top: auto;
        }

        main {
            flex-grow: 1;
            padding: 22px 0;
        }

        .content-container {
            background-color: var(--grouped-background);
            margin: 0 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 0.5px solid var(--separator-color);
            padding: 16px;
        }

        #question-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 60px;
        }

        #answers-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {

            cursor: pointer;
            border: 1px solid var(--separator-color);
            background: var(--grouped-background);

            text-align: left;

        .answer-btn:hover:not(:disabled) {

            border-color: var(--system-green);

            font-weight: 600;
        }
        .answer-btn.wrong {
            background-color: var(--system-red);
            border-color: var(--system-red);
            color: white;
            font-weight: 600;
        }
        
        .answer-btn:disabled {

            opacity: 0.8;
        }

        #next-button {

            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            background-color: var(--system-blue);
            color: white;
            border: none;
            border-radius: 8px;
        }
        
        #next-button:disabled {
            background-color: var(--system-gray);
        }

        #feedback {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 25px;
        }

        .correct-text { color: var(--system-green); }
        .wrong-text { color: var(--system-red); }

        h1 {

            margin-bottom: 20px;
            text-align: center;
        }
        
        @media (min-width: 768px) {
            main {

            }

            }
        }

<script>
const questions =
    [
    ["Какой оператор LINQ используется для группировки элементов последовательности по ключу и возвращает последовательность объектов IGrouping<TKey, TElement>?",["SelectMany","GroupBy","Join","ToLookup","Aggregate"],1],
    ["В чем ключевое отличие между ToLookup() и GroupBy() в LINQ?",["ToLookup() выполняет ленивую (deferred) группировку, а GroupBy() - жадную (immediate).","ToLookup() возвращает словарь, а GroupBy() - последовательность групп.","ToLookup() выполняет жадную (immediate) группировку и кэширует результаты, а GroupBy() использует ленивое выполнение (deferred execution).","GroupBy() не может использовать кастомный компаратор для ключей, в отличие от ToLookup().","Результат ToLookup() можно изменять, а результат GroupBy() - нет."],2],
    ["Какой тип соединения (join) в LINQ вернет все элементы из левой последовательности и только совпадающие элементы из правой?",["Inner Join","Group Join","Left Outer Join (с использованием DefaultIfEmpty)","Cross Join","Right Outer Join"],2],
    ["Для чего предназначен оператор LINQ `Zip`?",["Для архивации последовательности в zip-файл.","Для объединения двух последовательностей в одну путем применения функции к элементам с одинаковыми индексами.","Для фильтрации элементов на основе другой последовательности.","Для проецирования каждого элемента в новую форму.","Для пропуска определенного количества элементов в последовательности."],1],
    ["Что делает метод расширения `AsParallel()` в LINQ?",["Преобразует обычный LINQ-запрос в PLINQ-запрос для параллельного выполнения.","Сериализует результаты запроса в параллельном потоке.","Гарантирует последовательное выполнение запроса.","Выполняет запрос асинхронно, не блокируя вызывающий поток.","Кэширует результаты запроса для последующего использования."],0],
    ["Что такое 'Large Object Heap' (LOH) в .NET и какие объекты в него попадают?",["Специальная куча для хранения статических объектов.","Область памяти для объектов размером более 85 000 байт, которая не уплотняется (compacted) при сборке мусора.","Куча для хранения объектов, переживших несколько сборок мусора.","Область памяти для сборок, загруженных динамически.","Память, выделенная вне управляемой кучи."],1],
    ["Какое поколение в сборщике мусора .NET содержит самые 'долгоживущие' объекты?",["Поколение 0","Поколение 1","Поколение 2","LOH (Large Object Heap)","Поколение Эфемерных объектов"],2],
    ["Что такое 'Task Continuation' в TPL?",["Метод, который выполняется после завершения предыдущей задачи (Task).","Задача, которая отменяет другую задачу.","Задача, которая никогда не завершается.","Задача, которая выполняется в UI-потоке.","Задача, которая является дочерней по отношению к другой."],0],["Для чего используется Expression<Func<T>>?",["Для представления лямбда-выражения в виде дерева выражения, а не скомпилированного кода.","Для создания делегатов, которые выполняются быстрее.","Для определения анонимных методов.","Это устаревший способ создания лямбда-выражений.","Для работы с динамическими объектами."],0],["Как получить доступ к значению по указателю в `unsafe` контексте?",["С помощью оператора разыменования (*).","С помощью метода GetValue().","С помощью оператора ->.","С помощью приведения типа (cast).","Указатели не могут быть разыменованы."],0],["Что такое `stackalloc`?",["Оператор для выделения блока памяти в стеке, а не в куче.","Функция для подсчета количества элементов в стеке.","Атрибут, указывающий, что класс должен быть размещен в стеке.","Метод для очистки стека.","Оператор для создания нового стека."],0],["В чем преимущество использования `Span<T>`?",["Позволяет работать с различными видами памяти (массивы, строки, нативная память) без выделения новой памяти и копирования.","Обеспечивает безопасность типов при работе с указателями.","Упрощает работу с многомерными массивами.","Автоматически освобождает память.","`Span<T>` может храниться в куче."],0],["Какой атрибут позволяет сделать `internal` члены сборки видимыми для другой, 'дружественной' сборки?",["[assembly: InternalsVisibleTo(FriendAssemblyName)]","[assembly: Friend(FriendAssemblyName)]","[assembly: PublicApi]","[assembly: AllowPartiallyTrustedCallers]","[assembly: InternalsPublic]"],0],["Для чего используется `Mutex`?",["Для синхронизации доступа к ресурсу между разными процессами.","Для синхронизации доступа к ресурсу только в пределах одного процесса.","Для атомарного инкремента переменной.","Для отправки сигнала между потоками.","Для приостановки потока на определенное время."],0],["Чем `SemaphoreSlim` отличается от `Semaphore`?",["`SemaphoreSlim` - это более легковесная версия, оптимизированная для использования в рамках одного процесса.","`SemaphoreSlim` не поддерживает именованные семафоры для межпроцессной синхронизации.","`Semaphore` является оберткой над объектом ядра ОС, а `SemaphoreSlim` - нет (в большинстве случаев).","Все вышеперечисленное.","Нет никаких отличий."],3],["Что делает `ReaderWriterLockSlim`?",["Позволяет множественные одновременные доступы на чтение, но эксклюзивный доступ на запись.","Обеспечивает более высокую пропускную способность для сценариев с частым чтением и редкой записью.","Является заменой для более старого `ReaderWriterLock`.","Позволяет 'улучшать' блокировку с чтения до записи.","Все вышеперечисленное."],4],["Какой из перечисленных методов не является потокобезопасным для экземпляра `List<T>`?",["Add","Remove","this[int index] (сеттер)","Sort","Все перечисленные методы не являются потокобезопасными."],4],["Что такое `Expression.Lambda`?",["Метод для компиляции дерева выражения в исполняемый делегат.","Директива для определения лямбда-выражения.","Тип данных для лямбда-функций.","Атрибут для пометки лямбда-выражений.","Создает фабрику делегатов из дерева выражения."],0],["Что такое 'pinning' объекта при работе с `unsafe` кодом?",["Фиксация объекта в памяти, чтобы сборщик мусора не перемещал его во время уплотнения кучи.","Удаление объекта из памяти.","Размещение объекта в специальной области памяти.","Создание сильной ссылки на объект.","Процесс получения указателя на объект."],0],["Какой метод используется для атомарного приращения значения переменной?",["Interlocked.Increment()","lock(obj) { i++; }","Volatile.Write()","Interlocked.Add()","Thread.SpinWait()"],0],["Что такое `[StructLayout(LayoutKind.Sequential)]`?",["Атрибут, который указывает компилятору располагать поля структуры в памяти последовательно, в порядке их объявления.","Используется для взаимодействия с неуправляемым кодом (P/Invoke).","Задает выравнивание полей структуры.","Определяет размер структуры.","Указывает, что структура является blittable."],0],["Что такое `AppDomain`?",["Изолированная среда внутри процесса, где исполняется код .NET.","Процесс операционной системы.","Сборка .NET.","Контекст потока.","Во фреймворке .NET Core и новее концепция `AppDomain` значительно упрощена и не используется для изоляции кода."],4],["Что такое `TaskCompletionSource<T>`?",["Класс, который позволяет создать `Task` и управлять им вручную (устанавливать результат, исключение или отмену) извне.","Источник для отмены задач.","Фабрика для создания задач.","Коллекция для завершенных задач.","Обертка над `Task` для добавления метаданных."],0],["В каком пространстве имен находятся основные классы для работы с потоками, такие как `Thread` и `ThreadPool`?",["System.Threading","System.Collections.Concurrent","System.Threading.Tasks","System.Diagnostics","System.Runtime.CompilerServices"],0],["Что такое `Monitor.Wait` и `Monitor.Pulse`?",["Методы для координации потоков, позволяющие одному потоку ждать сигнала от другого, удерживая блокировку.","Методы для приостановки и возобновления потока.","Устаревшие методы, замененные `Task.Delay`.","Методы для работы с мьютексами.","Методы для управления состоянием потока."],0],["Что такое 'boxing' (упаковка)?",["Процесс преобразования значения значимого типа (struct) в объект ссылочного типа (object).","Процесс создания 'коробки' вокруг значения.","Приводит к выделению памяти в куче.","Все вышеперечисленное.","Может негативно влиять на производительность."],3],["Что такое 'unboxing' (распаковка)?",["Процесс извлечения значения значимого типа из объекта, в который оно было упаковано.","Требует явного приведения к исходному типу.","Может вызвать `InvalidCastException`, если тип указан неверно.","Все вышеперечисленное.","Освобождает память в куче."],3],["Какой метод `string` является наиболее производительным для объединения большого количества строк?",["String.Concat() или String.Join()","Использование оператора `+` в цикле","Использование `StringBuilder`","string.Format()","Интерполяция строк (`${s1}{s2}`)"],2],["Что такое `[Conditional(DEBUG)]`?",["Атрибут, который указывает, что вызов метода будет скомпилирован только если определен символ `DEBUG`.","Метод будет выполнен только в режиме отладки.","Атрибут для условной компиляции.","Символ может быть любым, не только `DEBUG`.","Все вышеперечисленное."],4],["Какая коллекция в `System.Collections.Concurrent` реализует шаблон 'производитель-потребитель'?",["BlockingCollection<T>","ConcurrentQueue<T>","ConcurrentStack<T>","ConcurrentBag<T>","ConcurrentDictionary<TKey, TValue>"],0],["Что такое 'Code Access Security' (CAS)?",["Устаревшая технология безопасности в .NET Framework, которая ограничивала доступ кода к ресурсам на основе его происхождения и других свидетельств.","Современная модель безопасности в .NET Core.","Система управления доступом на основе ролей.","Механизм для подписи сборок.","Технология для изоляции приложений."],0],["Для чего используется ключевое слово `volatile`?",["Указывает, что поле может изменяться несколькими потоками, и предотвращает некоторые виды оптимизаций компилятора и кэширования процессором.","Делает поле потокобезопасным.","Запрещает изменение поля.","Гарантирует атомарность операций с полем.","Является устаревшим."],0],["Что такое `GCHandle`?",["Структура, позволяющая получить стабильный указатель на управляемый объект, чтобы его не перемещал сборщик мусора.","Дескриптор для объекта в куче.","Используется для передачи управляемых объектов в неуправляемый код.","Может создавать разные типы ссылок (Normal, Pinned, Weak).","Все вышеперечисленное."],4],["Какой тип данных в C# является псевдонимом для `System.Int64`?",["long","int","short","byte","ulong"],0],["Что такое 'covariance' и 'contravariance' для generic-типов?",["Способность использовать более производный (covariance) или менее производный (contravariance) тип, чем указано в generic-параметре.","Относится только к интерфейсам и делегатам.","Ключевые слова `out` (covariance) и `in` (contravariance).","Все вышеперечисленное.","Не поддерживается для классов."],3],["Что такое `IQueryable<T>` и чем он отличается от `IEnumerable<T>`?",["`IQueryable<T>` представляет запрос, который будет выполнен на удаленном источнике данных (например, в SQL), а `IEnumerable<T>` представляет локальную последовательность в памяти.","`IQueryable` позволяет строить дерево выражения, которое может быть транслировано (например, в SQL).","Запросы к `IEnumerable` выполняются в .NET, а к `IQueryable` - на стороне сервера БД.","Все вышеперечисленное.","Нет никакой разницы."],3],["Что такое `[MethodImpl(MethodImplOptions.AggressiveInlining)]`?",["Атрибут, который настоятельно рекомендует JIT-компилятору встроить (inline) данный метод в место вызова.","Гарантирует, что метод будет встроен.","Улучшает производительность для маленьких, часто вызываемых методов.","Может увеличить размер итогового кода.","Все вышеперечисленное."],4],["Что делает `[DefaultValue]`?",["Атрибут, который указывает значение по умолчанию для свойства, в основном для использования в дизайнерах (например, Windows Forms).","Устанавливает значение свойства при создании объекта.","Используется для валидации.","Является заменой для инициализатора свойства.","Требуется для всех свойств."],0],["В чем разница между `Array` и `ArrayList`?",["`Array` имеет фиксированный размер и является строго типизированным.","`ArrayList` имеет динамический размер и хранит элементы как `object` (не является строго типизированным).","`ArrayList` считается устаревшим, следует использовать `List<T>`.","Все вышеперечисленное.","`Array` - это структура, а `ArrayList` - класс."],3],["Что такое `IDispatch`?",["COM-интерфейс, который позволяет реализовать позднее связывание (late binding) и вызывать методы объекта по имени.","Интерфейс для отправки соо исленное.","Строки (`string`) не являются blittable."],3],["Что такое `Activator.CreateInstance<T>()`?",["Метод для создания экземпляра типа `T` с использованием его конструктора без параметров.","Использует рефлексию.","Медленнее, чем прямой вызов `new T()`.","Все вышеперечисленное.","Может создавать экземпляры приватных классов."],3],["Что такое 'side-by-side execution'?",["Возможность запускать несколько версий .NET Framework на одном компьютере.","Запуск двух экземпляров одного приложения.","Выполнение кода на нескольких ядрах процессора.","Устаревшая концепция, не применимая к .NET Core/5+.","В .NET Core/5+ приложения являются самодостаточными или используют framework-dependent развертывание, что решает эту проблему по-другому."],4]];

const questionTextEl = document.getElementById('question-text');
const answersContainerEl = document.getElementById('answers-container');
const feedbackEl = document.getElementById('feedback');
const nextButton = document.getElementById('next-button');

let currentQuestionIndex = 0;
let score = 0;
let correctAnswerText = '';

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showQuestion() {
  feedbackEl.innerHTML = '';
  nextButton.disabled = true;
  
  if (currentQuestionIndex >= questions.length) {
      const percentage = (score / questions.length) * 100;
      let message = '';
      if (percentage >= 95) {
          message = 'Отлично!';
      } else if (percentage >= 75) {
          message = 'Хорошо!';
      } else if (percentage >= 50) {
          message = 'Сомнительно, но окей.';
      } else if (percentage >= 25) {
          message = 'Пиздец, бро.';
      } else {
          message = 'Тебе пизда :)';
      }

      questionTextEl.textContent = 'Тест завершен!';
      answersContainerEl.innerHTML = '';
      feedbackEl.innerHTML = `Вы набрали ${score} из ${questions.length} (${percentage.toFixed(0)}%). ${message}`;
      nextButton.textContent = 'Начать заново';
      nextButton.disabled = false;
      nextButton.onclick = () => location.reload();
      return;
  }

  const questionData = questions[currentQuestionIndex];
  const question = questionData[0];
  const allAnswers = questionData[1];
  const correctAnswIndex = questionData[2]
  correctAnswerText = allAnswers[correctAnswIndex];

  // Get all incorrect answers
  const incorrectAnswers = allAnswers.filter((_, index) => index !== correctAnswIndex);
  
  // Shuffle incorrect answers and pick two
  shuffleArray(incorrectAnswers);
  const selectedIncorrectAnswers = incorrectAnswers.slice(0, 2);

  // Create the final list of answers for the user and shuffle it
  const answersToShow = [correctAnswerText, ...selectedIncorrectAnswers];
  shuffleArray(answersToShow);


  questionTextEl.textContent = `${currentQuestionIndex + 1}. ${question}`;
  answersContainerEl.innerHTML = '';

  answersToShow.forEach(answer => {
    const button = document.createElement('button');
    button.textContent = answer;
    button.classList.add('answer-btn');
    button.onclick = () => selectAnswer(button, answer);
    answersContainerEl.appendChild(button);
  });
}

function selectAnswer(selectedButton, selectedAnswer) {
  const isCorrect = selectedAnswer === correctAnswerText;

  Array.from(answersContainerEl.children).forEach(button => {
    button.disabled = true;
    if (button.textContent === correctAnswerText) {
      button.classList.add('correct');
      if (button.textContent === selectedButton.textContent) {
          if (!selectedButton.classList.contains('wrong')) {
             score++;
          }
      }
    } else if (button === selectedButton) {
      button.classList.add('wrong');
    }
  });

  if (isCorrect) {
    feedbackEl.textContent = 'Правильно!';
    feedbackEl.className = 'correct-text';
  } else {
    feedbackEl.textContent = 'Неправильно!';
    feedbackEl.className = 'wrong-text';
  }

  nextButton.disabled = false;
}

nextButton.addEventListener('click', () => {
    currentQuestionIndex++;
    showQuestion();
});

// Initial load
shuffleArray(questions);
showQuestion();
</script>
