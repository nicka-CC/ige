<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Тест по программированию 4</title>
    <style>
        :root {
            --system-background: #f2f2f7;
            --system-blue: #007aff;
            --system-gray: #8e8e93;
            --separator-color: #c6c6c8;
            --label-primary: #000000;
            --label-secondary: #8e8e93;
            --grouped-background: #ffffff;
            --grouped-background-ios: #f0f0f0;
            --system-green: #34c759;
            --system-red: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Arial", sans-serif;
            margin: 0;
            background-color: var(--grouped-background-ios);
            color: var(--label-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .header {
            background-color: var(--grouped-background);
            padding: 12px 10px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            border-bottom: 0.5px solid var(--separator-color);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button {
            position: absolute;
            left: 16px;
            font-size: 17px;
            color: var(--system-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .footer {
            background-color: var(--grouped-background);
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--label-secondary);
            border-top: 0.5px solid var(--separator-color);
            margin-top: auto;
        }

        main {
            flex-grow: 1;
            padding: 22px 0;
        }

        .content-container {
            background-color: var(--grouped-background);
            margin: 0 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 0.5px solid var(--separator-color);
            padding: 16px;
        }

        #question-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 60px;
        }

        #answers-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            cursor: pointer;
            border: 1px solid var(--separator-color);
            background: var(--grouped-background);
            border-radius: 8px;
            text-align: left;
            transition: background-color 0.2s;
        }

        .answer-btn:hover:not(:disabled) {
            background: #e5e5ea;
        }
        
        .answer-btn.correct {
            background-color: var(--system-green);
            border-color: var(--system-green);
            color: white;
            font-weight: 600;
        }
        .answer-btn.wrong {
            background-color: var(--system-red);
            border-color: var(--system-red);
            color: white;
            font-weight: 600;
        }
        
        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        #next-button {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            background-color: var(--system-blue);
            color: white;
            border: none;
            border-radius: 8px;
        }
        
        #next-button:disabled {
            background-color: var(--system-gray);
        }

        #feedback {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 25px;
        }

        .correct-text { color: var(--system-green); }
        .wrong-text { color: var(--system-red); }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        @media (min-width: 768px) {
            main {
                display: flex;
                justify-content: center;
            }
            .content-container {
                max-width: 600px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="back-button">&lsaquo; Назад</a>
        <span>Тест по программированию 4</span>
    </header>

    <main>

            <h1>Тест по программированию 4</h1>
            <div id="quiz-area">
                <div id="question-text"></div>
                <div id="answers-container"></div>
                <div id="feedback"></div>
            </div>
            <button id="next-button">Следующий вопрос</button>

const questionTextEl = document.getElementById('question-text');
const answersContainerEl = document.getElementById('answers-container');
const feedbackEl = document.getElementById('feedback');
const nextButton = document.getElementById('next-button');

let currentQuestionIndex = 0;
let score = 0;
let correctAnswerText = '';

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showQuestion() {
  feedbackEl.innerHTML = '';
  nextButton.disabled = true;
  
  if (currentQuestionIndex >= questions.length) {
      const percentage = (score / questions.length) * 100;
      let message = '';
      if (percentage >= 95) {
          message = 'Отлично!';
      } else if (percentage >= 75) {
          message = 'Хорошо!';
      } else if (percentage >= 50) {
          message = 'Сомнительно, но окей.';
      } else if (percentage >= 25) {
          message = 'Пиздец, бро.';
      } else {
          message = 'Тебе пизда :)';
      }

      questionTextEl.textContent = 'Тест завершен!';
      answersContainerEl.innerHTML = '';
      feedbackEl.innerHTML = `Вы набрали ${score} из ${questions.length} (${percentage.toFixed(0)}%). ${message}`;
      nextButton.textContent = 'Начать заново';
      nextButton.disabled = false;
      nextButton.onclick = () => location.reload();
      return;
  }

  const questionData = questions[currentQuestionIndex];
  const question = questionData[0];
  const allAnswers = questionData[1];
  const correctAnswIndex = questionData[2]
  correctAnswerText = allAnswers[correctAnswIndex];

  // Get all incorrect answers
  const incorrectAnswers = allAnswers.filter((_, index) => index !== correctAnswIndex);
  
  // Shuffle incorrect answers and pick two
  shuffleArray(incorrectAnswers);
  const selectedIncorrectAnswers = incorrectAnswers.slice(0, 2);

  // Create the final list of answers for the user and shuffle it
  const answersToShow = [correctAnswerText, ...selectedIncorrectAnswers];
  shuffleArray(answersToShow);


  questionTextEl.textContent = `${currentQuestionIndex + 1}. ${question}`;
  answersContainerEl.innerHTML = '';

  answersToShow.forEach(answer => {
    const button = document.createElement('button');
    button.textContent = answer;
    button.classList.add('answer-btn');
    button.onclick = () => selectAnswer(button, answer);
    answersContainerEl.appendChild(button);
  });
}

function selectAnswer(selectedButton, selectedAnswer) {
  const isCorrect = selectedAnswer === correctAnswerText;

  Array.from(answersContainerEl.children).forEach(button => {
    button.disabled = true;
    if (button.textContent === correctAnswerText) {
      button.classList.add('correct');
      if (button.textContent === selectedButton.textContent) {
          if (!selectedButton.classList.contains('wrong')) {
             score++;
          }
      }
    } else if (button === selectedButton) {
      button.classList.add('wrong');
    }
  });

  if (isCorrect) {
    feedbackEl.textContent = 'Правильно!';
    feedbackEl.className = 'correct-text';
  } else {
    feedbackEl.textContent = 'Неправильно!';
    feedbackEl.className = 'wrong-text';
  }

  nextButton.disabled = false;
}

nextButton.addEventListener('click', () => {
    currentQuestionIndex++;
    showQuestion();
});

// Initial load
shuffleArray(questions);
showQuestion();
