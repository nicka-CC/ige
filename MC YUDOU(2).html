        }

        .content-container { background-color: var(--grouped-background); margin: 0 16px; border-radius: 10px; overflow: hidden; border: 0.5px solid var(--separator-color); padding: 16px; }
        #question-text { font-size: 18px; font-weight: 500; margin-bottom: 20px; min-height: 60px; }
        #answers-container { display: flex; flex-direction: column; gap: 12px; }
        .answer-btn { width: 100%; padding: 14px 16px; font-size: 17px; cursor: pointer; border: 1px solid var(--separator-color); background: var(--grouped-background); border-radius: 8px; text-align: left; transition: background-color 0.2s; }
        .answer-btn:hover:not(:disabled) { background: #e5e5ea; }
        .answer-btn.correct { background-color: var(--system-green); border-color: var(--system-green); color: white; font-weight: 600; }
        .answer-btn.wrong { background-color: var(--system-red); border-color: var(--system-red); color: white; font-weight: 600; }
        .answer-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        #feedback { text-align: center; font-size: 18px; font-weight: bold; margin-top: 20px; min-height: 25px; }
        .correct-text { color: var(--system-green); }
        .wrong-text { color: var(--system-red); }

    ["Последовательную, по выделенным линиям (lanes)", "Параллельную 32-битную шину", "Оптическую передачу", "Беспроводную передачу", "Аналоговый сигнал", "Передачу с общей шиной", "Кольцевую передачу токена", "Асинхронную передачу байтов", "Передачу с контролем четности", "Синхронную передачу с общим тактовым сигналом"], 0],

    ["Что такое 'DNS-сервер'?",
    ["Сервер, преобразующий доменные имена в IP-адреса", "Сервер, раздающий IP-адреса в сети (DHCP)", "Сервер, хранящий файлы (File Server)", "Сервер электронной почты (Mail Server)", "Прокси-сервер", "Веб-сервер", "Сервер баз данных", "Шлюз по умолчанию", "Маршрутизатор", "Сетевой коммутатор"], 0],

    ["В сетях 4G/LTE, что означает аббревиатура 'LTE'?",
    ["Long-Term Evolution (Долгосрочная Эволюция)", "Light Transmission Emitter", "Local Telecom Exchange", "Link-Type Encryption", "Low-Throughput Emitter", "Latency-Tolerant Environment", "Layer-Two-Ethernet", "Logical-Transmission-Entity", "Line-Termination-Equipment", "Long-Term-Encryption"], 0],

    ["Какой кабель используется для прямого соединения двух однотипных устройств (например, компьютер-компьютер) без коммутатора?",
    ["Перекрестный (Crossover)", "Прямой (Straight-through)", "Консольный (Rollover)", "Оптоволоконный", "Коаксиальный", "Телефонный (RJ-11)", "SATA-кабель", "USB-кабель", "HDMI-кабель", "Силовой кабель"], 0],

    ["Что такое 'Firewall' (межсетевой экран)?",
    ["Система, контролирующая и фильтрующая сетевой трафик на основе заданных правил", "Антивирусная программа", "Система обнаружения вторжений", "Прокси-сервер", "VPN-шлюз", "Устройство резервного копирования", "Протокол шифрования", "Средство аутентификации", "Коммутатор L3", "Балансировщик нагрузки"], 0]
];

const questionTextEl = document.getElementById('question-text');
const answersContainerEl = document.getElementById('answers-container');
const feedbackEl = document.getElementById('feedback');
const nextButton = document.getElementById('next-button');

let currentQuestionIndex = 0;
let correctAnswerText = '';

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showQuestion() {
  feedbackEl.innerHTML = '';
  nextButton.disabled = true;
  
  if (currentQuestionIndex >= questions.length) {
      questionTextEl.textContent = 'Тест завершен!';
      answersContainerEl.innerHTML = '';
      feedbackEl.innerHTML = `Вы ответили на все вопросы. Чтобы начать заново, обновите страницу.`;
      nextButton.textContent = 'Начать заново';
      nextButton.disabled = false;
      nextButton.onclick = () => location.reload();
      return;
  }

  const questionData = questions[currentQuestionIndex];
  const question = questionData[0];
  const allAnswers = questionData[1];
  const correctAnswIndex = questionData[2]
  correctAnswerText = allAnswers[correctAnswIndex];

  // Get all incorrect answers
  const incorrectAnswers = allAnswers.filter((_, index) => index !== correctAnswIndex);
  
  // Shuffle incorrect answers and pick two
  shuffleArray(incorrectAnswers);
  const selectedIncorrectAnswers = incorrectAnswers.slice(0, 2);

  // Create the final list of answers for the user and shuffle it
  const answersToShow = [correctAnswerText, ...selectedIncorrectAnswers];
  shuffleArray(answersToShow);


  questionTextEl.textContent = `${currentQuestionIndex + 1}. ${question}`;
  answersContainerEl.innerHTML = '';

  answersToShow.forEach(answer => {
    const button = document.createElement('button');
    button.textContent = answer;
    button.classList.add('answer-btn');
    button.onclick = () => selectAnswer(button, answer);
    answersContainerEl.appendChild(button);
  });
}

function selectAnswer(selectedButton, selectedAnswer) {
  const isCorrect = selectedAnswer === correctAnswerText;

  Array.from(answersContainerEl.children).forEach(button => {
    button.disabled = true;
    if (button.textContent === correctAnswerText) {
      button.classList.add('correct');
    } else if (button === selectedButton) {
      button.classList.add('wrong');
    }
  });

  if (isCorrect) {
    feedbackEl.textContent = 'Правильно!';
    feedbackEl.className = 'correct-text';
  } else {
    feedbackEl.textContent = 'Неправильно!';
    feedbackEl.className = 'wrong-text';
  }

  nextButton.disabled = false;
}

nextButton.addEventListener('click', () => {
    currentQuestionIndex++;
    showQuestion();
});

// Initial load
shuffleArray(questions);
showQuestion();
</script>
